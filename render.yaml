services:
  - type: web
    name: ryu-project-hub
    runtime: static
    buildCommand: echo "No build required"
    staticPublishPath: .
    previews:
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
